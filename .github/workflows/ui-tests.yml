name: UI Tests

on:
  schedule:
    - cron: '0 */4 * * *'
  pull_request:
  workflow_dispatch:

concurrency:
  group: gh-pages-ui-${{ github.event_name == 'pull_request' && github.ref || 'scheduled' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-fallback-test-secret' }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dashboard-server/package-lock.json
            tests/package-lock.json

      - name: Install dashboard-server dependencies
        working-directory: dashboard-server
        run: npm ci

      - name: Install tests dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Lint Allure descriptions
        working-directory: tests
        run: npm run lint:allure

      - name: Run UI tests
        working-directory: tests
        run: npm run test:ui

      - name: Upload raw test artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ui-test-artifacts
          path: |
            tests/allure-results
            tests/playwright-report
          retention-days: 14

      - name: Check out gh-pages history
        if: always() && github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/checkout@v7.0.0
        with:
          ref: gh-pages
          path: gh-pages

      - name: Seed GitHub Pages landing page
        if: always() && github.event_name != 'pull_request'
        run: |
          mkdir -p gh-pages
          cp .github/pages/index.html gh-pages/index.html
          cp .github/pages/404.html gh-pages/404.html

      - name: Generate Allure report with history
        if: always() && github.event_name != 'pull_request'
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: tests/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          subfolder: ui-report
          keep_reports: '200'
          report_name: 'Quality Dashboard — UI Tests'

      - name: Deploy report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          allow_empty_commit: true
