name: API Tests

on:
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch:

concurrency:
  group: gh-pages-api
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  api-tests:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dashboard-server/package-lock.json
            tests/package-lock.json

      - name: Install dashboard-server dependencies
        working-directory: dashboard-server
        run: npm ci

      - name: Install tests dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Lint Allure descriptions
        working-directory: tests
        run: npm run lint:allure

      - name: Run API tests
        working-directory: tests
        run: npm run test:api

      - name: Upload raw test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            tests/allure-results
            tests/playwright-report
          retention-days: 14

      - name: Check out gh-pages history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Seed GitHub Pages landing page
        if: always()
        run: |
          mkdir -p gh-pages
          cp .github/pages/index.html gh-pages/index.html

      - name: Generate Allure report with history
        if: always()
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: tests/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          subfolder: api-report
          keep_reports: '20'
          report_name: 'Quality Dashboard — API Tests'

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
